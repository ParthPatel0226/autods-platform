<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AutoDS — Autonomous Data Science, Engineered.</title>
<meta name="description" content="From raw data to production models. An 8-agent autonomous platform that runs the full data science workflow with domain-aware reasoning.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/framer-motion@10.18.0/dist/framer-motion.js"></script>

<style>
  /* ============ DARK THEME (default) ============ */
  :root, [data-theme="dark"] {
    --bg: #07091A;
    --bg-1: #0B0F2A;
    --bg-2: #11173D;
    --bg-3: #1A2150;
    --surface: rgba(255, 255, 255, 0.04);
    --surface-2: rgba(255, 255, 255, 0.08);
    --surface-3: rgba(255, 255, 255, 0.12);
    --border: rgba(255, 255, 255, 0.08);
    --border-2: rgba(255, 255, 255, 0.14);
    --ink: #F4F5FF;
    --ink-2: #C4C7E8;
    --ink-dim: #8B91C1;
    --ink-faint: #5B608A;
    --indigo: #6366F1;
    --violet: #8B5CF6;
    --purple: #A855F7;
    --pink: #EC4899;
    --cyan: #22D3EE;
    --green: #10B981;
    --amber: #F59E0B;

    --nav-bg: rgba(11, 15, 42, 0.7);
    --terminal-bg: rgba(0, 0, 0, 0.4);
    --terminal-header: rgba(0, 0, 0, 0.5);
    --grid-line: rgba(139, 92, 246, 0.08);
    --aurora-1: rgba(139, 92, 246, 0.25);
    --aurora-2: rgba(34, 211, 238, 0.12);
    --aurora-3: rgba(236, 72, 153, 0.12);
    --star-opacity: 0.5;
    --sheen: rgba(255, 255, 255, 0.05);
    --shadow-glow: 0 30px 80px rgba(99, 102, 241, 0.15);
    --code-text: #F4F5FF;
    --gradient-text: linear-gradient(135deg, #FFFFFF 0%, #C4B5FD 40%, #818CF8 70%, #22D3EE 100%);
  }

  /* ============ LIGHT THEME ============ */
  [data-theme="light"] {
    --bg: #FAFAFC;
    --bg-1: #F4F5F9;
    --bg-2: #EBEDF4;
    --bg-3: #E0E3EE;
    --surface: rgba(255, 255, 255, 0.7);
    --surface-2: rgba(255, 255, 255, 0.85);
    --surface-3: rgba(255, 255, 255, 1);
    --border: rgba(15, 23, 42, 0.08);
    --border-2: rgba(15, 23, 42, 0.14);
    --ink: #0F172A;
    --ink-2: #334155;
    --ink-dim: #64748B;
    --ink-faint: #94A3B8;
    --indigo: #4F46E5;
    --violet: #7C3AED;
    --purple: #9333EA;
    --pink: #DB2777;
    --cyan: #0891B2;
    --green: #059669;
    --amber: #D97706;

    --nav-bg: rgba(255, 255, 255, 0.75);
    --terminal-bg: #0F172A;
    --terminal-header: #1E293B;
    --grid-line: rgba(124, 58, 237, 0.06);
    --aurora-1: rgba(124, 58, 237, 0.18);
    --aurora-2: rgba(8, 145, 178, 0.12);
    --aurora-3: rgba(219, 39, 119, 0.12);
    --star-opacity: 0;
    --sheen: rgba(124, 58, 237, 0.06);
    --shadow-glow: 0 30px 80px rgba(124, 58, 237, 0.12);
    --code-text: #F4F5FF;
    --gradient-text: linear-gradient(135deg, #0F172A 0%, #4F46E5 40%, #7C3AED 70%, #DB2777 100%);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter Tight', sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
    line-height: 1.5;
    letter-spacing: -0.01em;
    transition: background 0.4s ease, color 0.4s ease;
  }
  .font-display { font-family: 'Instrument Serif', serif; font-weight: 400; letter-spacing: -0.02em; }
  .font-mono { font-family: 'JetBrains Mono', monospace; }
  .italic-serif { font-family: 'Instrument Serif', serif; font-style: italic; font-weight: 400; }

  /* Cosmic background */
  .cosmic-bg {
    background:
      radial-gradient(ellipse 80% 50% at 50% -10%, var(--aurora-1), transparent),
      radial-gradient(ellipse 60% 50% at 100% 30%, var(--aurora-2), transparent),
      radial-gradient(ellipse 60% 50% at 0% 60%, var(--aurora-3), transparent),
      var(--bg);
  }

  .grid-pattern {
    background-image:
      linear-gradient(var(--grid-line) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
    background-size: 60px 60px;
    mask-image: radial-gradient(ellipse 90% 70% at 50% 30%, black 30%, transparent 80%);
    -webkit-mask-image: radial-gradient(ellipse 90% 70% at 50% 30%, black 30%, transparent 80%);
  }

  .stars {
    background-image:
      radial-gradient(1px 1px at 20% 30%, white, transparent),
      radial-gradient(1px 1px at 60% 70%, white, transparent),
      radial-gradient(1px 1px at 50% 50%, rgba(255,255,255,0.6), transparent),
      radial-gradient(1px 1px at 80% 10%, rgba(255,255,255,0.8), transparent),
      radial-gradient(1px 1px at 90% 60%, white, transparent),
      radial-gradient(1px 1px at 33% 95%, rgba(255,255,255,0.7), transparent),
      radial-gradient(1px 1px at 15% 80%, white, transparent),
      radial-gradient(1px 1px at 70% 40%, rgba(255,255,255,0.5), transparent);
    background-size: 400px 400px;
    opacity: var(--star-opacity);
    transition: opacity 0.4s ease;
  }

  .glow-text {
    background: var(--gradient-text);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  ::-webkit-scrollbar { width: 10px; }
  ::-webkit-scrollbar-track { background: var(--bg-1); }
  ::-webkit-scrollbar-thumb { background: var(--bg-3); border-radius: 5px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--violet); }

  @keyframes marquee-scroll {
    from { transform: translateX(0); }
    to { transform: translateX(-50%); }
  }
  .marquee-track {
    animation: marquee-scroll 50s linear infinite;
    display: flex;
    width: max-content;
  }

  .glass {
    background: var(--surface);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1px solid var(--border);
  }

  .glass-strong {
    background: var(--surface-2);
    backdrop-filter: blur(32px);
    -webkit-backdrop-filter: blur(32px);
    border: 1px solid var(--border-2);
  }

  .btn-glow {
    position: relative;
    background: linear-gradient(135deg, var(--indigo) 0%, var(--violet) 50%, var(--purple) 100%);
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.1) inset,
      0 8px 32px rgba(139, 92, 246, 0.4),
      0 4px 16px rgba(99, 102, 241, 0.3);
    transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .btn-glow:hover {
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.2) inset,
      0 12px 48px rgba(139, 92, 246, 0.6),
      0 8px 24px rgba(99, 102, 241, 0.5);
    transform: translateY(-2px);
  }

  @keyframes blink-cursor { 50% { opacity: 0; } }
  .cursor-blink {
    display: inline-block;
    width: 8px; height: 16px;
    background: currentColor;
    animation: blink-cursor 1s steps(1) infinite;
    vertical-align: middle;
  }

  @keyframes pulse-ring {
    0% { transform: scale(1); opacity: 1; }
    100% { transform: scale(2.5); opacity: 0; }
  }

  .hover-glow:hover {
    box-shadow: 0 0 40px -8px rgba(139, 92, 246, 0.5);
    border-color: rgba(139, 92, 246, 0.4);
  }

  .spotlight {
    position: absolute;
    border-radius: 50%;
    filter: blur(60px);
    pointer-events: none;
    opacity: 0.5;
  }

  .card-sheen {
    position: relative;
    overflow: hidden;
  }
  .card-sheen::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, var(--sheen), transparent);
    transition: left 0.7s;
  }
  .card-sheen:hover::before {
    left: 100%;
  }

  .status-pulse {
    position: relative;
    display: inline-flex;
    width: 8px;
    height: 8px;
  }
  .status-pulse::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: var(--green);
    animation: pulse-ring 2s ease-out infinite;
  }
  .status-pulse::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: var(--green);
  }
</style>
</head>
<body>

<div id="root"></div>

<script type="text/babel">
const FM = window.Motion || window.framerMotion;
const motion = FM.motion;
const useInView = FM.useInView;
const useScroll = FM.useScroll;
const useTransform = FM.useTransform;
const AnimatePresence = FM.AnimatePresence;
const { useState, useRef, useEffect, createContext, useContext } = React;

// =================== CONFIG ===================
// Change this to your deployed Streamlit URL when you ship.
// For local dev, it's typically http://localhost:8501
const APP_URL = "http://localhost:8501";
const GITHUB_URL = "https://github.com/your-username/autods";  // ← update with your repo
const DOCS_URL = "#docs";

// =================== THEME CONTEXT ===================
const ThemeContext = createContext({ theme: 'dark', toggle: () => {} });

function ThemeProvider({ children }) {
  const [theme, setTheme] = useState('dark');

  useEffect(() => {
    const saved = localStorage.getItem('autods-theme');
    if (saved) setTheme(saved);
    else if (window.matchMedia('(prefers-color-scheme: light)').matches) setTheme('light');
  }, []);

  useEffect(() => {
    document.documentElement.setAttribute('data-theme', theme);
    localStorage.setItem('autods-theme', theme);
  }, [theme]);

  const toggle = () => setTheme(t => t === 'dark' ? 'light' : 'dark');
  return <ThemeContext.Provider value={{ theme, toggle }}>{children}</ThemeContext.Provider>;
}

function ThemeToggle() {
  const { theme, toggle } = useContext(ThemeContext);
  const isDark = theme === 'dark';
  return (
    <motion.button
      onClick={toggle}
      whileHover={{ scale: 1.05 }}
      whileTap={{ scale: 0.92 }}
      transition={{ type: 'spring', stiffness: 400, damping: 20 }}
      className="relative flex items-center justify-center flex-shrink-0 cursor-pointer"
      style={{
        width: '44px',
        height: '44px',
        borderRadius: '999px',
        background: isDark
          ? 'linear-gradient(135deg, #6366F1, #A855F7)'
          : 'linear-gradient(135deg, #F59E0B, #EC4899)',
        border: '2px solid var(--border-2)',
        color: 'white',
        boxShadow: isDark
          ? '0 0 24px rgba(168, 85, 247, 0.6), 0 4px 12px rgba(99, 102, 241, 0.4)'
          : '0 0 24px rgba(245, 158, 11, 0.5), 0 4px 12px rgba(236, 72, 153, 0.3)',
      }}
      aria-label={`Switch to ${isDark ? 'light' : 'dark'} mode`}
      title={`Switch to ${isDark ? 'light' : 'dark'} mode`}
    >
      <AnimatePresence mode="wait">
        {isDark ? (
          <motion.svg
            key="moon"
            initial={{ rotate: -180, opacity: 0, scale: 0.3 }}
            animate={{ rotate: 0, opacity: 1, scale: 1 }}
            exit={{ rotate: 180, opacity: 0, scale: 0.3 }}
            transition={{ duration: 0.4, ease: [0.16, 1, 0.3, 1] }}
            width="20" height="20" viewBox="0 0 20 20" fill="white"
          >
            <path d="M17.5 11.875A7.5 7.5 0 0 1 8.125 2.5 7.5 7.5 0 1 0 17.5 11.875z"/>
            <circle cx="14" cy="5" r="0.8" opacity="0.7"/>
            <circle cx="16" cy="9" r="0.6" opacity="0.5"/>
          </motion.svg>
        ) : (
          <motion.svg
            key="sun"
            initial={{ rotate: 180, opacity: 0, scale: 0.3 }}
            animate={{ rotate: 0, opacity: 1, scale: 1 }}
            exit={{ rotate: -180, opacity: 0, scale: 0.3 }}
            transition={{ duration: 0.4, ease: [0.16, 1, 0.3, 1] }}
            width="20" height="20" viewBox="0 0 20 20" fill="white"
          >
            <circle cx="10" cy="10" r="4"/>
            <g stroke="white" strokeWidth="2" strokeLinecap="round">
              <line x1="10" y1="1.5" x2="10" y2="3.5"/>
              <line x1="10" y1="16.5" x2="10" y2="18.5"/>
              <line x1="1.5" y1="10" x2="3.5" y2="10"/>
              <line x1="16.5" y1="10" x2="18.5" y2="10"/>
              <line x1="3.5" y1="3.5" x2="4.9" y2="4.9"/>
              <line x1="15.1" y1="15.1" x2="16.5" y2="16.5"/>
              <line x1="3.5" y1="16.5" x2="4.9" y2="15.1"/>
              <line x1="15.1" y1="4.9" x2="16.5" y2="3.5"/>
            </g>
          </motion.svg>
        )}
      </AnimatePresence>
    </motion.button>
  );
}

// =================== FLOATING THEME TOGGLE (always visible) ===================
function FloatingThemeToggle() {
  const { theme, toggle } = useContext(ThemeContext);
  const isDark = theme === 'dark';
  return (
    <motion.div
      initial={{ opacity: 0, scale: 0, y: 100 }}
      animate={{ opacity: 1, scale: 1, y: 0 }}
      transition={{ delay: 1.5, duration: 0.6, type: 'spring', stiffness: 200 }}
      className="fixed bottom-6 right-6 z-50"
    >
      <motion.button
        onClick={toggle}
        whileHover={{ scale: 1.08, rotate: isDark ? -10 : 10 }}
        whileTap={{ scale: 0.92 }}
        className="relative flex items-center gap-3 px-5 py-3 rounded-full font-medium text-sm cursor-pointer"
        style={{
          background: isDark
            ? 'linear-gradient(135deg, #6366F1, #A855F7)'
            : 'linear-gradient(135deg, #F59E0B, #EC4899)',
          color: 'white',
          border: '2px solid var(--border-2)',
          boxShadow: isDark
            ? '0 8px 32px rgba(168, 85, 247, 0.5), 0 0 0 1px rgba(255,255,255,0.1) inset'
            : '0 8px 32px rgba(245, 158, 11, 0.5), 0 0 0 1px rgba(255,255,255,0.2) inset',
        }}
        aria-label={`Switch to ${isDark ? 'light' : 'dark'} mode`}
      >
        <AnimatePresence mode="wait">
          {isDark ? (
            <motion.div
              key="moon-float"
              initial={{ rotate: -180, opacity: 0 }}
              animate={{ rotate: 0, opacity: 1 }}
              exit={{ rotate: 180, opacity: 0 }}
              transition={{ duration: 0.4 }}
              className="flex items-center gap-2"
            >
              <svg width="18" height="18" viewBox="0 0 20 20" fill="white">
                <path d="M17.5 11.875A7.5 7.5 0 0 1 8.125 2.5 7.5 7.5 0 1 0 17.5 11.875z"/>
              </svg>
              <span className="hidden sm:inline">Light Mode</span>
            </motion.div>
          ) : (
            <motion.div
              key="sun-float"
              initial={{ rotate: 180, opacity: 0 }}
              animate={{ rotate: 0, opacity: 1 }}
              exit={{ rotate: -180, opacity: 0 }}
              transition={{ duration: 0.4 }}
              className="flex items-center gap-2"
            >
              <svg width="18" height="18" viewBox="0 0 20 20" fill="white">
                <circle cx="10" cy="10" r="4"/>
                <g stroke="white" strokeWidth="2" strokeLinecap="round">
                  <line x1="10" y1="1.5" x2="10" y2="3.5"/>
                  <line x1="10" y1="16.5" x2="10" y2="18.5"/>
                  <line x1="1.5" y1="10" x2="3.5" y2="10"/>
                  <line x1="16.5" y1="10" x2="18.5" y2="10"/>
                  <line x1="3.5" y1="3.5" x2="4.9" y2="4.9"/>
                  <line x1="15.1" y1="15.1" x2="16.5" y2="16.5"/>
                  <line x1="3.5" y1="16.5" x2="4.9" y2="15.1"/>
                  <line x1="15.1" y1="4.9" x2="16.5" y2="3.5"/>
                </g>
              </svg>
              <span className="hidden sm:inline">Dark Mode</span>
            </motion.div>
          )}
        </AnimatePresence>
      </motion.button>
    </motion.div>
  );
}

// =================== NAV ===================
function Nav() {
  const [scrolled, setScrolled] = useState(false);
  const [mobileOpen, setMobileOpen] = useState(false);
  const { theme } = useContext(ThemeContext);

  useEffect(() => {
    const onScroll = () => setScrolled(window.scrollY > 30);
    window.addEventListener('scroll', onScroll);
    return () => window.removeEventListener('scroll', onScroll);
  }, []);

  const navItems = [
    { name: 'Platform', href: '#workflow' },
    { name: 'Agents', href: '#agents' },
    { name: 'Architecture', href: '#architecture' },
    { name: 'Stack', href: '#stack' }
  ];

  return (
    <>
      <motion.nav
        initial={{ y: -80, opacity: 0 }}
        animate={{ y: 0, opacity: 1 }}
        transition={{ duration: 0.6, ease: [0.16, 1, 0.3, 1] }}
        className="fixed top-4 left-1/2 -translate-x-1/2 z-50 w-[calc(100%-32px)] max-w-5xl rounded-full"
        style={{
          background: 'var(--nav-bg)',
          backdropFilter: 'blur(32px)',
          WebkitBackdropFilter: 'blur(32px)',
          border: '1px solid var(--border-2)',
          boxShadow: scrolled ? '0 8px 32px rgba(0,0,0,0.2), 0 0 0 1px rgba(139,92,246,0.15) inset' : '0 4px 16px rgba(0,0,0,0.1)',
          transition: 'box-shadow 0.3s, background 0.4s'
        }}
      >
        <div className="px-4 md:px-5 py-2.5 flex items-center justify-between gap-3">
          {/* Logo */}
          <motion.a href="#" whileHover={{ scale: 1.02 }} className="flex items-center gap-2 flex-shrink-0">
            <div className="relative w-8 h-8 rounded-lg flex items-center justify-center" style={{ background: 'linear-gradient(135deg, var(--indigo), var(--purple))', boxShadow: '0 4px 12px rgba(139,92,246,0.4)' }}>
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                <path d="M2 8 L6 4 L10 8 L14 4" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
                <path d="M2 12 L6 8 L10 12 L14 8" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" opacity="0.6"/>
              </svg>
            </div>
            <span className="font-semibold tracking-tight text-[15px]">AutoDS</span>
          </motion.a>

          {/* Desktop Links */}
          <div className="hidden md:flex items-center gap-0.5 text-sm flex-shrink-0" style={{ color: 'var(--ink-2)' }}>
            {navItems.map((item) => (
              <motion.a
                key={item.name}
                href={item.href}
                whileHover={{ background: 'var(--surface-2)' }}
                className="px-3 py-1.5 rounded-full transition-colors whitespace-nowrap"
              >
                {item.name}
              </motion.a>
            ))}
          </div>

          {/* Right cluster */}
          <div className="flex items-center gap-2 flex-shrink-0">
            <ThemeToggle />
            <motion.a
              whileHover={{ scale: 1.04, y: -1 }}
              whileTap={{ scale: 0.97 }}
              href={APP_URL}
              target="_blank"
              rel="noopener noreferrer"
              className="btn-glow inline-flex items-center gap-1.5 text-sm font-medium px-4 py-2 rounded-full text-white whitespace-nowrap"
            >
              <span className="hidden sm:inline">Launch App</span>
              <span className="sm:hidden">Launch</span>
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                <path d="M3 7h8m0 0L7 3m4 4l-4 4" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
              </svg>
            </motion.a>

            {/* Mobile menu button */}
            <button
              onClick={() => setMobileOpen(!mobileOpen)}
              className="md:hidden w-10 h-10 rounded-full glass flex items-center justify-center"
              aria-label="Menu"
            >
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                <path d={mobileOpen ? "M3 3l10 10M13 3L3 13" : "M2 4h12M2 8h12M2 12h12"} stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/>
              </svg>
            </button>
          </div>
        </div>
      </motion.nav>

      {/* Mobile Menu */}
      <AnimatePresence>
        {mobileOpen && (
          <motion.div
            initial={{ opacity: 0, y: -20 }}
            animate={{ opacity: 1, y: 0 }}
            exit={{ opacity: 0, y: -20 }}
            className="fixed top-20 left-4 right-4 z-40 rounded-2xl glass-strong p-3 md:hidden"
          >
            {navItems.map((item) => (
              <a
                key={item.name}
                href={item.href}
                onClick={() => setMobileOpen(false)}
                className="block px-4 py-3 rounded-xl text-sm font-medium hover:bg-white/5 transition-colors"
                style={{ color: 'var(--ink-2)' }}
              >
                {item.name}
              </a>
            ))}
          </motion.div>
        )}
      </AnimatePresence>
    </>
  );
}

// =================== HERO ===================
function Hero() {
  const ref = useRef(null);
  const { scrollYProgress } = useScroll({ target: ref, offset: ["start start", "end start"] });
  const y = useTransform(scrollYProgress, [0, 1], [0, 200]);
  const opacity = useTransform(scrollYProgress, [0, 0.7], [1, 0]);

  const variants = {
    hidden: { opacity: 0 },
    visible: { opacity: 1, transition: { staggerChildren: 0.12, delayChildren: 0.2 } }
  };
  const item = {
    hidden: { y: 30, opacity: 0 },
    visible: { y: 0, opacity: 1, transition: { duration: 0.9, ease: [0.16, 1, 0.3, 1] } }
  };

  return (
    <section ref={ref} className="relative pt-36 pb-24 cosmic-bg overflow-hidden min-h-screen flex flex-col items-center justify-center">
      <div className="absolute inset-0 stars"></div>
