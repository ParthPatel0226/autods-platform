version: "3.8"

services:
  # Streamlit Dashboard
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    ports:
      - "8501:8501"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - AUTODS_DUCKDB_PATH=/app/data/warehouse.duckdb
      - AUTODS_SQLITE_PATH=/app/sessions/autods.db
      - MLFLOW_TRACKING_URI=/app/mlruns
    volumes:
      - ./data:/app/data
      - ./sessions:/app/sessions
      - ./outputs:/app/outputs
      - ./mlruns:/app/mlruns
      - ./logs:/app/logs
    restart: unless-stopped

  # FastAPI Prediction API
  api:
    build:
      context: .
      dockerfile: serving/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    volumes:
      - ./data:/app/data
      - ./mlruns:/app/mlruns
    restart: unless-stopped
    depends_on:
      - dashboard

  # MLflow Tracking Server (optional)
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.18.0
    ports:
      - "5000:5000"
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:///mlflow.db --default-artifact-root /mlruns
    volumes:
      - ./mlruns:/mlruns
    restart: unless-stopped
