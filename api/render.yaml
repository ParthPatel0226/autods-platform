services:
  - type: web
    name: autods-api
    env: docker
    dockerfilePath: ./api/Dockerfile
    # Build context is the repo root so all backend modules are reachable
    rootDir: .
    plan: free
    healthCheckPath: /health
    envVars:
      - key: SUPABASE_URL
        sync: false            # set in Render dashboard
      - key: SUPABASE_KEY
        sync: false            # set in Render dashboard (service_role key)
      - key: GEMINI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true    # Render generates a random secret on first deploy
      - key: JWT_EXPIRE_MINUTES
        value: "60"
      - key: ALLOWED_ORIGINS
        value: "https://autods.vercel.app,https://autods.streamlit.app"
      - key: LOG_LEVEL
        value: "INFO"
      - key: MAX_UPLOAD_MB
        value: "250"
      - key: PORT
        value: "8000"
