# Logging configuration

version: 1
disable_existing_loggers: false

formatters:
  standard:
    format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"
  json:
    format: "%(message)s"

handlers:
  console:
    class: logging.StreamHandler
    level: INFO
    formatter: standard
    stream: ext://sys.stdout
  file:
    class: logging.FileHandler
    level: DEBUG
    formatter: standard
    filename: logs/autods.log
    mode: a

loggers:
  agents:
    level: DEBUG
    handlers: [console, file]
  core:
    level: DEBUG
    handlers: [console, file]
  data_connectors:
    level: INFO
    handlers: [console, file]

root:
  level: INFO
  handlers: [console]
