# Domain Configurations (YAML companion to Python domain classes)
# These can be edited without modifying code.
# Python domain classes in domains/ take priority; this file is for reference/override.

healthcare:
  display_name: "Healthcare"
  icon: "🏥"
  detection_keywords:
    strong:
      - patient_id
      - diagnosis
      - icd
      - admission
      - discharge
      - readmission
      - hemoglobin
      - creatinine
      - mortality
      - diagnosis_code
      - procedure_code
      - drg
      - ndc
    moderate:
      - age
      - gender
      - bmi
      - blood_pressure
      - heart_rate
      - medication
      - lab
      - vitals
      - insurance
      - length_of_stay
      - comorbidity
    weak:
      - id
      - date
      - status
      - type
      - code
  primary_metrics:
    classification: [sensitivity, specificity, auc_roc, ppv, npv]
    regression: [mae, rmse, r2]
    survival: [concordance_index, brier_score]
  cost_matrix:
    false_negative: 10
    false_positive: 1
  fairness:
    required: true
    protected_attributes: [race, gender, age_group, insurance_type]
  compliance_notes:
    - "Check for PHI (Protected Health Information)"
    - "HIPAA considerations for data handling"
    - "Model decisions must be explainable for clinical use"

finance:
  display_name: "Finance"
  icon: "💰"
  detection_keywords:
    strong:
      - transaction_amount
      - credit_score
      - account_balance
      - default
      - delinquency
      - fraud
      - loan
      - credit_limit
      - interest_rate
      - payment
    moderate:
      - amount
      - balance
      - account
      - merchant
      - currency
      - risk
      - score
      - income
      - debt
    weak:
      - id
      - date
      - status
      - type
  primary_metrics:
    classification: [ks_statistic, gini_coefficient, auc_roc, precision, recall]
    regression: [rmse, mae, r2]
  cost_matrix:
    false_negative: 100
    false_positive: 1
  compliance_notes:
    - "Fair lending regulations (ECOA, FCRA)"
    - "Adverse action reason codes may be required"
    - "Check for disparate impact on protected classes"

