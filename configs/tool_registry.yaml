    name: "Mann-Whitney U Test"
    domains: [all]
  - id: chi_square
    name: "Chi-Square Test of Independence"
    domains: [all]
  - id: fisher_exact
    name: "Fisher's Exact Test"
    domains: [all]
  - id: anova_oneway
    name: "One-Way ANOVA"
    domains: [all]
  - id: kruskal_wallis
    name: "Kruskal-Wallis H Test"
    domains: [all]
  - id: shapiro_wilk
    name: "Shapiro-Wilk Normality Test"
    domains: [all]
  - id: levene_test
    name: "Levene's Test for Equal Variances"
    domains: [all]
  - id: correlation_pearson
    name: "Pearson Correlation"
    domains: [all]
