name: Benchmarks

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"  # Weekly Monday 6am UTC

permissions:
  contents: read

jobs:
  benchmark:
    name: Run Benchmark Suite
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-bench-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Download datasets
        run: python scripts/download_sample_datasets.py

      - name: Run benchmarks
        run: python tests/benchmarks/run_benchmarks.py

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: evaluation/benchmarks/benchmark_results.json
          retention-days: 90
