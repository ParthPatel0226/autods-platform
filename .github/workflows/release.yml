name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -e .

      - name: Run tests
        run: pytest tests/unit/ -v --tb=short

      - name: Build package
        run: |
          pip install build
          python -m build

      - name: Generate changelog
        id: changelog
        run: |
          # Get commits since last tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --oneline --no-merges)
          else
            COMMITS=$(git log --oneline --no-merges "${PREV_TAG}..HEAD")
          fi
          echo "COMMITS<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMITS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: |
            ## AutoDS Platform ${{ github.ref_name }}

            ### Changes
            ${{ steps.changelog.outputs.COMMITS }}

            ### Installation
            ```bash
            pip install -r requirements.txt
            pip install -e .
            ```

            ### Quick Start
            ```bash
            make setup
            make run
            ```
          files: dist/*
          generate_release_notes: true

  docker:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [release]
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push dashboard image
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/autods-dashboard
          docker build -f Dockerfile.dashboard -t "${IMAGE}:${{ github.ref_name }}" -t "${IMAGE}:latest" .
          docker push "${IMAGE}:${{ github.ref_name }}"
          docker push "${IMAGE}:latest"

      - name: Build and push API image
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/autods-api
          docker build -f serving/Dockerfile -t "${IMAGE}:${{ github.ref_name }}" -t "${IMAGE}:latest" .
          docker push "${IMAGE}:${{ github.ref_name }}"
          docker push "${IMAGE}:latest"
